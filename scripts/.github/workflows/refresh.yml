name: Refresh trends

on:
  # Cada lunes 9:00 UTC (= 6 AM Argentina, 3 AM México)
  schedule:
    - cron: '0 9 * * 1'
  # Permite correr manualmente desde la pestaña Actions
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run refresh script
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
        run: python scripts/refresh.py

      - name: Commit & push if changed
        run: |
          git config user.name "trend-radar-bot"
          git config user.email "bot@users.noreply.github.com"
          if [[ -n "$(git status --porcelain trends.json)" ]]; then
            git add trends.json
            git commit -m "chore: refresh trends $(date -u +%Y-%m-%d)"
            git push
          else
            echo "No changes to trends.json"
          fi
              
